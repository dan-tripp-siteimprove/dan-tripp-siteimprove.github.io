<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width">

<style>

p { 
	line-height: 1.5;
}

/* thanks https://www.tpgi.com/the-anatomy-of-visually-hidden/#where-we-came-in */
.visually-hidden:not(:focus):not(:active) {
	clip-path: inset(50%);
	height: 1px;
	overflow: hidden;
	position: absolute;
	white-space: nowrap;
	width: 1px;
}

table {
	border-collapse: separate;
	border-spacing: 0;
}

table td,
table th {
	border: 0;
	outline: 1px solid black;
	outline-offset: -1px;
	padding: 0.25em;
	line-height: 1.2;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	box-sizing: border-box;
	height: 1.7em;
}

#data-table {
	display: block;
	width: 100%;
	overflow: hidden;
	outline: 2px solid black;
}

#data-table thead {
	display: block;
	width: 100%;
	position: sticky;
	top: 0;
	background-color: #333;
	color: white;
	z-index: 1;
	overflow-y: scroll;
}

#data-table thead tr {
	display: table;
	width: 100%;
	table-layout: fixed;
}

#data-table thead th {
	outline: 1px solid white;
	outline-offset: -1px;
}

#data-table tbody {
	display: block;
	width: 100%;
	overflow-y: scroll;
	max-height: calc(7 * 1.7em);
}

#data-table tbody tr {
	display: table;
	width: 100%;
	table-layout: fixed;
	height: 1.7em;
}


</style>

	<script>
{

	function getShadowRoots() {
		if(!document.body) { // under realistic conditions, this will never happen, I think.  under contrived test conditions I made it happen by running this script very early in the page load process (= under tampermonkey, @run-at document-start, no sleep.  
			return [];
		}
		let r = [document.body];
		function walk(node__) {
			let shadowRoot = node__.shadowRoot;
			if(shadowRoot) {
				r.push(shadowRoot);
				walk(shadowRoot);
			}
			for (let child of node__.childNodes) {
				if (child.nodeType === Node.ELEMENT_NODE) {
					walk(child);
				}
			}
		}
		walk(document.body);
		return r;
	}


	function removeIframesIfFileUriScheme() {
		if(location.protocol !== "file:") return;
		for(let root of [document, ...getShadowRoots()]) {
			for(let iframe of root.querySelectorAll('iframe')) {
				let newWarningElem = document.createElement('div');
				newWarningElem.style.fontSize = '2em';
				newWarningElem.style.color = 'rgba(235, 0, 0)';
				newWarningElem.textContent = `IFRAME REMOVED.  Because you are viewing this page as a file:// URL, many tools can't handle this, even though the iframe will technically load.  It's more trouble than it's worth.  Recommendation: start a local web server, then view this page as an http:// URL.`;
				iframe.replaceWith(newWarningElem);
			}
		}
	}

	function seededRandom(seed) {
		const x = Math.sin(seed) * 10000;
		return x - Math.floor(x);
	}

	function generateFundData(fundId) {
		const fundNames = [
			'Pinnacle Growth Strategy Fund', 'Horizon 500 Index', 'Silverlake Blue Chip Growth',
			'Northstar Growth Fund of America', 'Crestview Total Return', 'Ironwood Global Allocation',
			'Meridian Equity Income', 'Westfield Stock Fund', 'Riverside Total Return Bond',
			'Bayshore Capital Appreciation', 'Mountainview Mid Cap', 'Lakeside Dividend Income',
			'Redstone Bond Debenture', 'Clearwater Value Fund', 'Springhill Genesis',
			'Crossroads Select Fund', 'Skyline Odyssey Growth', 'Summit Special Equity',
			'Cornerstone S&P 500 Index', 'Bluewater Dividend Growth', 'Greenwood Wellington',
			'Parkside Mid Cap Value', 'Riverbend Aggregate Bond', 'Timberline Growth',
			'Lighthouse US Large Cap Value', 'Cascade Contrafund', 'Fairmont Income',
			'Eastwood Healthcare Fund', 'Palmetto Developing Markets', 'Ridgeline Enterprise',
			'Harborview Bond Fund', 'Oakridge ICAP Equity', 'Maplewood High Yield Municipal Bond',
			'Windmill Gold & Special Minerals', 'Seaside Jennison Growth', 'Ashford Blue Chip',
			'Pathfinder UltraBull', 'Grandview Equity Income', 'Sunset Nova Fund', 'Hillcrest Equity 500 Index',
			'Trailhead Growth Fund', 'Gateway Equity Index', 'Foxridge Growth', 'Highpoint Sycamore Established Value',
			'Springwater Special Mid Cap Value', 'Millstone Core Bond', 'Kingsley Discovery Growth',
			'Silverpoint Growth', 'Crestline Value', 'Woodland Tax-Managed Growth', 'Riverside Growth Opportunities'
		];
		const assetClasses = ['Large Cap', 'Mid Cap', 'Small Cap', 'Bond', 'International', 'Emerging Markets', 'Real Estate', 'Commodities'];
		
		const fundName = fundNames[fundId % 50];
		const ticker = fundName.split(' ').slice(0, 2).map(w => w.substring(0, 2)).join('').toUpperCase() + 'X';
		const nav = (50 + seededRandom(fundId * 13) * 150).toFixed(2);
		const yearReturn = ((seededRandom(fundId * 17) - 0.3) * 30).toFixed(2);
		const expenseRatio = (0.05 + seededRandom(fundId * 19) * 1.5).toFixed(2);
		const assetClass = assetClasses[Math.floor(seededRandom(fundId * 23) * assetClasses.length)];
		
		return [fundName, ticker, `$${nav}`, `${yearReturn}%`, `${expenseRatio}%`, assetClass];
	}

	function loadTableData() {
		const tbody = document.querySelector('#data-table tbody');
		if (!tbody) return;
		let numRows = 118;
		for (let i = 0; i < numRows; i++) {
			const tr = document.createElement('tr');
			const firstTd = document.createElement('td');
			firstTd.textContent = i+1;
			tr.appendChild(firstTd);
			const fundData = generateFundData(i + 1);
			fundData.forEach(val => {
				const td = document.createElement('td');
				td.textContent = val;
				tr.appendChild(td);
			});
			tbody.appendChild(tr);
		}
	}

	window.addEventListener("load", function(event) {
		removeIframesIfFileUriScheme();
		loadTableData();
	});
}
	</script>
